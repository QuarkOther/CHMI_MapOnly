# Konfigurace aplikace ČHMÚ radar.
# Precedence hodnot: proměnná prostředí > tento soubor > výchozí hodnota v kódu.
# (Docker/compose si stejnojmenné hodnoty může přepsat přes environment.)

[server]
# Adresa a port viewer serveru.
host = 127.0.0.1
port = 8987

[downloader]
# Interval mezi aktualizacemi dat v sekundách.
interval = 300
# Kolik hodin radarových dat držet zpětně.
hours_back = 8

[sources]
# Zdrojové URL ČHMÚ open data (končí lomítkem).
radar_url = https://opendata.chmi.cz/meteorology/weather/radar/composite/maxz/png/
forecast_url = https://opendata.chmi.cz/meteorology/weather/radar/composite/fct_maxz/png/

[paths]
# Adresáře pro stažená data. Relativní cesty se berou od kořene projektu.
radar_dir = radar
forecast_dir = forecast
