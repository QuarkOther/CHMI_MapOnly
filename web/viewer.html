<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ČHMÚ radar</title>
<link rel="stylesheet" href="/static/leaflet/leaflet.css">
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }
  #map { flex: 1; background: #000; }
  #controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: #1a1a1a;
    flex-wrap: wrap;
  }
  #seek {
    flex: 1;
    min-width: 160px;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: #444;
    outline: none;
  }
  #seek::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
  }
  #seek::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border: 0;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
  }
  button {
    background: #2563eb;
    color: #fff;
    border: 0;
    border-radius: 4px;
    padding: 8px 16px;
    font-size: 15px;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  #info { font-variant-numeric: tabular-nums; min-width: 150px; }
  #info .fct { color: #ffb347; }
  label.ctl { font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 6px; }
  #layers, #overlays { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #layers label.ctl, #overlays label.ctl { color: #ddd; cursor: pointer; }
  #dl {
    color: #93c5fd;
    font-size: 13px;
    text-decoration: none;
  }
  #dl:hover { text-decoration: underline; }
  /* zachovat radarové barvy ostré i přes průhlednost */
  .leaflet-image-layer { image-rendering: pixelated; }
  /* značky pozemních stanic – popisky vystředěné na bod stanice */
  .st-icon { background: none; border: 0; }
  .st-box {
    display: inline-block;        /* roztáhne pozadí podle obsahu (rodič má šířku 0) */
    width: max-content;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    background: rgba(17, 17, 17, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 4px;
    padding: 2px 6px;
    font: 600 12px system-ui, sans-serif;
    line-height: 1.25;
    color: #fff;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
  }
  .st-t { font-size: 13px; }
  .st-sub { display: block; color: #cbd5e1; font-weight: 500; }
  .st-arrow { display: inline-block; margin-right: 2px; }
  #help {
    position: absolute;
    right: 12px;
    bottom: 12px;
    z-index: 1000;
    background: rgba(26, 26, 26, 0.85);
    color: #ddd;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.9;
    pointer-events: none;
  }
  #help .key {
    display: inline-block;
    min-width: 16px;
    padding: 1px 6px;
    margin-right: 3px;
    text-align: center;
    background: #333;
    border: 1px solid #555;
    border-bottom-width: 2px;
    border-radius: 4px;
    font-family: monospace;
  }
</style>
</head>
<body>
  <div id="map">
    <div id="help">
      <div><span class="key">◀</span><span class="key">▶</span> přepínání snímků</div>
    </div>
  </div>

  <div id="controls">
    <button id="playBtn">▶ Přehrát</button>
    <input id="seek" type="range" min="0" max="0" value="0" step="1">
    <span id="counter">0 / 0</span>
    <span id="info"><span id="time">—</span> <span id="tag"></span></span>
    <label class="ctl">
      rozsah
      <select id="range"></select>
    </label>
    <label class="ctl">
      rychlost
      <select id="speed">
        <option value="600">pomalu</option>
        <option value="300" selected>střední</option>
        <option value="120">rychle</option>
      </select>
    </label>
    <label class="ctl">
      průhlednost
      <input id="opacity" type="range" min="0.2" max="1" step="0.05" value="0.75">
    </label>
    <span id="overlays">
      srážky:
      <label class="ctl"><input id="showRadar" type="checkbox" checked> radar</label>
      <label class="ctl"><input id="showForecast" type="checkbox" checked> předpověď</label>
    </span>
    <span id="layers">
      stanice:
      <label class="ctl"><input type="checkbox" data-el="T"> teplota</label>
      <label class="ctl"><input type="checkbox" data-el="wind"> vítr</label>
      <label class="ctl"><input type="checkbox" data-el="H"> vlhkost</label>
      <label class="ctl"><input type="checkbox" data-el="P"> tlak</label>
    </span>
    <label class="ctl"><input id="geoloc" type="checkbox"> moje poloha</label>
    <a id="dl" href="/stations.json" download="chmi-stanice.json">⬇ data stanic</a>
  </div>

<script src="/static/leaflet/leaflet.js"></script>
<script>
// Geografický rozsah PNG (celý obraz) dle ČHMÚ: EPSG:3857
// lon 11.267–20.770°E, lat 48.047–52.167°N  ->  [[jih,západ],[sever,východ]]
const RADAR_BOUNDS = [[48.047, 11.267], [52.167, 20.770]];

let allFrames = [];   // vše stažené (radar + předpověď)
let frames = [];      // aktuálně zobrazené okno (po filtru rozsahu)
let idx = 0;
let timer = null;

const timeEl = document.getElementById("time");
const tagEl = document.getElementById("tag");
const seek = document.getElementById("seek");
const counter = document.getElementById("counter");
const playBtn = document.getElementById("playBtn");
const speed = document.getElementById("speed");
const opacity = document.getElementById("opacity");
const range = document.getElementById("range");
const showRadar = document.getElementById("showRadar");
const showForecast = document.getElementById("showForecast");

// keyboard: false – šipky ovládají snímky, ne posun mapy
const map = L.map("map", { keyboard: false }).setView([49.8, 15.5], 7);

// Mapové dlaždice online přímo z OSM serveru.
L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  minZoom: 6,
  maxZoom: 19,
  attribution: "© OpenStreetMap",
}).addTo(map);

const overlay = L.imageOverlay("", RADAR_BOUNDS, {
  opacity: Number(opacity.value),
}).addTo(map);

// Pozemní stanice ČHMÚ: bodová data vykreslená jako popisky nad radarem,
// synchronizovaná s časem zobrazeného snímku. Vrstvy zapínají checkboxy.
let stationData = { elements: [], stations: [] };
const activeEls = new Set();                 // zapnuté veličiny: T / wind / H / P
const stationLayer = L.layerGroup().addTo(map);

// Hodnota veličiny v čase snímku: poslední pozorování s časem <= ts.
// Pro novější snímky i předpověď drží poslední známé měření (zamrzne);
// null jen u snímků starších než vůbec první dostupné pozorování.
function sampleAt(pts, ts) {
  if (!pts || !pts.length) return null;
  let val = null;
  for (const p of pts) {
    if (p[0] <= ts) val = p[1];
    else break;
  }
  return val;
}

// Barva teploty: modrá (chladno) -> červená (horko), -15..40 °C.
function tColor(v) {
  const t = Math.max(-15, Math.min(40, v));
  const hue = 240 - ((t + 15) / 55) * 240;
  return `hsl(${hue}, 85%, 62%)`;
}

// Šipka větru: D je směr, ODKUD vítr vane; šipka ukazuje, KAM proudí (D+180).
function windHtml(f, d) {
  const arrow = d == null ? "" :
    `<span class="st-arrow" style="transform:rotate(${(d + 180) % 360}deg)">↑</span>`;
  return `<span class="st-sub">${arrow}${f.toFixed(1)} m/s</span>`;
}

function renderStations(ts) {
  stationLayer.clearLayers();
  if (!activeEls.size || ts == null) return;

  for (const st of stationData.stations) {
    const s = st.series;
    const parts = [];

    if (activeEls.has("T")) {
      const v = sampleAt(s.T, ts);
      if (v != null) parts.push(`<span class="st-t" style="color:${tColor(v)}">${v.toFixed(1)}°</span>`);
    }
    if (activeEls.has("wind")) {
      const f = sampleAt(s.F, ts);
      if (f != null) parts.push(windHtml(f, sampleAt(s.D, ts)));
    }
    if (activeEls.has("H")) {
      const v = sampleAt(s.H, ts);
      if (v != null) parts.push(`<span class="st-sub">${Math.round(v)} %</span>`);
    }
    if (activeEls.has("P")) {
      const v = sampleAt(s.P, ts);
      if (v != null) parts.push(`<span class="st-sub">${v.toFixed(0)} hPa</span>`);
    }

    if (!parts.length) continue;
    const icon = L.divIcon({
      className: "st-icon",
      iconSize: [0, 0],
      html: `<div class="st-box">${parts.join("")}</div>`,
    });
    L.marker([st.lat, st.lon], { icon, keyboard: false })
      .bindTooltip(st.name)
      .addTo(stationLayer);
  }
}

function currentTs() {
  // Bez snímků (radar i předpověď vypnuté) ber aktuální čas, ať stanice
  // ukazují poslední měření i bez radaru.
  return frames[idx] ? frames[idx].ts : Math.floor(Date.now() / 1000);
}

function loadStations() {
  return fetch("/stations.json")
    .then(r => r.json())
    .then(d => {
      stationData = d && d.stations ? d : { elements: [], stations: [] };
      renderStations(currentTs());
    });
}

document.querySelectorAll("#layers input[type=checkbox]").forEach(cb => {
  cb.addEventListener("change", () => {
    if (cb.checked) activeEls.add(cb.dataset.el);
    else activeEls.delete(cb.dataset.el);
    renderStations(currentTs());
  });
});

// Aktuální poloha: zaškrtnutím se přes prohlížeč zjistí poloha a vykreslí
// modré kolečko, které sleduje pohyb; odškrtnutím zmizí.
// Pozn.: geolokace funguje jen v zabezpečeném kontextu (localhost nebo HTTPS).
const geoloc = document.getElementById("geoloc");
let geoMarker = null;
let geoWatch = null;

geoloc.addEventListener("change", () => {
  if (geoloc.checked) startGeo();
  else stopGeo();
});

function startGeo() {
  if (!navigator.geolocation) {
    geoloc.checked = false;
    alert("Geolokace není v tomto prohlížeči dostupná.");
    return;
  }
  geoWatch = navigator.geolocation.watchPosition(
    pos => {
      const ll = [pos.coords.latitude, pos.coords.longitude];
      if (!geoMarker) {
        geoMarker = L.circleMarker(ll, {
          radius: 8,
          color: "#1d4ed8",
          weight: 2,
          fillColor: "#3b82f6",
          fillOpacity: 0.6,
        }).bindTooltip("Moje poloha").addTo(map);
      } else {
        geoMarker.setLatLng(ll);
      }
    },
    err => {
      geoloc.checked = false;
      stopGeo();
      alert("Polohu se nepodařilo zjistit: " + err.message);
    },
    { enableHighAccuracy: true }
  );
}

function stopGeo() {
  if (geoWatch !== null) {
    navigator.geolocation.clearWatch(geoWatch);
    geoWatch = null;
  }
  if (geoMarker) {
    map.removeLayer(geoMarker);
    geoMarker = null;
  }
}

// Počet pixelů na 1 cm pro daný displej (změřeno přes CSS jednotku cm).
function pxPerCm() {
  const probe = document.createElement("div");
  probe.style.cssText = "width:1cm;position:absolute;visibility:hidden";
  document.body.appendChild(probe);
  const px = probe.getBoundingClientRect().width;
  probe.remove();
  return px;
}

// Výchozí pohled: radar vyplní obrazovku s ~2 cm odstupem od okrajů.
const pad = Math.round(2 * pxPerCm());
map.fitBounds(RADAR_BOUNDS, { padding: [pad, pad] });

// Obarví posuvník: modrá = pozorování, oranžová = předpověď.
function paintSeek() {
  const fctIdx = frames.findIndex(f => f.forecast);
  if (fctIdx <= 0 || frames.length < 2) {
    seek.style.background = "#444";
    return;
  }
  const pct = (fctIdx / (frames.length - 1)) * 100;
  seek.style.background =
    `linear-gradient(to right, #2563eb 0 ${pct}%, #ffb347 ${pct}% 100%)`;
}

function show(i) {
  if (!frames.length) return;
  idx = (i + frames.length) % frames.length;
  const f = frames[idx];
  overlay.setUrl(f.url);
  timeEl.textContent = f.label;
  tagEl.textContent = f.forecast ? "(předpověď)" : "";
  tagEl.className = f.forecast ? "fct" : "";
  seek.value = idx;
  counter.textContent = (idx + 1) + " / " + frames.length;
  renderStations(f.ts);
}

function play() {
  if (timer) return;
  playBtn.textContent = "⏸ Stop";
  timer = setInterval(() => show(idx + 1), Number(speed.value));
}

function stop() {
  clearInterval(timer);
  timer = null;
  playBtn.textContent = "▶ Přehrát";
}

playBtn.addEventListener("click", () => timer ? stop() : play());

seek.addEventListener("input", () => {
  stop();
  show(Number(seek.value));
});

// šipkami se krokuje mezi snímky; přehrávání se přitom pozastaví
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") {
    stop();
    show(idx + 1);
    e.preventDefault();
  } else if (e.key === "ArrowLeft") {
    stop();
    show(idx - 1);
    e.preventDefault();
  }
});

speed.addEventListener("change", () => {
  if (timer) { stop(); play(); }
});

opacity.addEventListener("input", () => overlay.setOpacity(Number(opacity.value)));

// přednačtení snímků kvůli plynulé animaci (jen ty, co jsme ještě neviděli)
const preloaded = new Set();
function preload(list) {
  list.forEach(f => {
    if (preloaded.has(f.url)) return;
    preloaded.add(f.url);
    const im = new Image();
    im.src = f.url;
  });
}

// Naplní <select> volbami rozsahu odvozenými z hours_back (max okno):
// celé hodiny od maxima dolů ke 2, pak 1,5 / 1 / 0,5 h.
// Default je 3 h, a pokud je max < 3, největší dostupná hodnota.
function rangeChoices(maxHours) {
  const opts = [];
  for (let h = maxHours; h >= 2; h--) opts.push(h);
  for (const h of [1.5, 1, 0.5]) if (h <= maxHours) opts.push(h);
  return opts;
}

function rangeLabel(h) {
  if (h < 1) return (h * 60) + " min";              // 0,5 -> "30 min"
  if (Number.isInteger(h)) return h + " h";
  return String(h).replace(".", ",") + " h";        // 1,5 -> "1,5 h"
}

function buildRangeOptions(maxHours) {
  const max = Math.floor(Number(maxHours)) || 3;
  const choices = rangeChoices(max);
  range.innerHTML = "";
  for (const h of choices) {
    const o = document.createElement("option");
    o.value = String(h);
    o.textContent = rangeLabel(h);
    range.appendChild(o);
  }
  range.value = String(max >= 3 ? 3 : choices[0]);  // choices[0] = největší
}

// Z plně stažených dat (allFrames) vybere okno dle zvoleného rozsahu.
// Předpověď zůstává vždy; rozsah omezuje jen pozorování (radar).
function applyRange() {
  const hours = Number(range.value);  // 0 = vše
  if (!hours) {
    frames = allFrames.slice();
  } else {
    let lastRadarTs = null;
    for (const f of allFrames) if (!f.forecast) lastRadarTs = f.ts;
    if (lastRadarTs === null) {
      frames = allFrames.slice();
    } else {
      const cutoff = lastRadarTs - hours * 3600;
      frames = allFrames.filter(f => f.forecast || f.ts >= cutoff);
    }
  }
  // checkboxy radar / předpověď: vyfiltruj vypnutý typ snímků
  if (!showRadar.checked) frames = frames.filter(f => f.forecast);
  if (!showForecast.checked) frames = frames.filter(f => !f.forecast);
  seek.max = Math.max(0, frames.length - 1);
  paintSeek();
}

// Přepočítá zobrazené okno (po změně rozsahu nebo zapnutí/vypnutí vrstev) a
// zachová pokud možno prohlížený snímek; když nezbyl žádný, skryje overlay.
function refreshFrames() {
  const playing = timer !== null;
  const currentUrl = frames[idx] ? frames[idx].url : null;
  applyRange();

  if (!frames.length) {
    stop();
    overlay.setOpacity(0);
    seek.value = 0;
    counter.textContent = "0 / 0";
    timeEl.textContent = "—";
    tagEl.textContent = "";
    tagEl.className = "";
    renderStations(currentTs());  // stanice ukaž i bez radaru
    return;
  }

  overlay.setOpacity(Number(opacity.value));
  preload(frames);
  let i = frames.findIndex(f => f.url === currentUrl);
  if (i < 0) i = playing ? frames.length - 1 : Math.min(idx, frames.length - 1);
  show(i);
}

range.addEventListener("change", refreshFrames);
showRadar.addEventListener("change", refreshFrames);
showForecast.addEventListener("change", refreshFrames);

function loadFrames(initial) {
  return fetch("/frames")
    .then(r => r.json())
    .then(data => {
      const prevLast = allFrames.length ? allFrames[allFrames.length - 1].url : null;
      const newLast = data.length ? data[data.length - 1].url : null;
      const changed = data.length !== allFrames.length || newLast !== prevLast;
      if (!initial && !changed) return;  // nic nového – neruš pohled

      const playing = timer !== null;
      const currentUrl = frames[idx] ? frames[idx].url : null;

      allFrames = data;
      applyRange();
      preload(frames);

      if (initial) {
        show(0);
        play();  // automatické přehrávání střední rychlostí (výchozí v <select>)
      } else if (playing) {
        show(frames.length - 1);  // sleduje živě → skoč na nejnovější snímek
      } else {
        // ručně krokuje → zachovej prohlížený snímek (index se mohl posunout úklidem)
        let i = frames.findIndex(f => f.url === currentUrl);
        if (i < 0) i = Math.min(idx, frames.length - 1);
        show(i);
      }
    });
}

// nejdřív zjisti maximální okno (hours_back) a postav volby rozsahu
fetch("/config")
  .then(r => r.json())
  .then(cfg => buildRangeOptions(cfg.hours_back))
  .catch(() => buildRangeOptions(3))
  .then(() => {
    loadFrames(true).catch(() => { timeEl.textContent = "chyba načítání snímků"; });
    // pravidelně dotahuj nové snímky bez nutnosti refreshe stránky
    setInterval(() => loadFrames(false).catch(() => {}), 60000);
    // data stanic (mění se ~každých INTERVAL s) – načti a periodicky obnovuj
    loadStations().catch(() => {});
    setInterval(() => loadStations().catch(() => {}), 120000);
  });
</script>
</body>
</html>
